name: Preprocess Breast Cancer Dataset

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  preprocessing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run automated preprocessing
        run: |
          python preprocessing/automate_Nikolas_Febrianto.py             --raw-path breast_cancer_raw/breast_cancer_raw.csv             --output-dir preprocessing/breast_cancer_preprocessing

      - name: Upload preprocessed dataset artifact
        uses: actions/upload-artifact@v5
        with:
          name: breast_cancer_preprocessing
          path: preprocessing/breast_cancer_preprocessing/

      - name: Commit updated preprocessing output
        if: github.event_name == 'workflow_dispatch'
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "chore: update preprocessed breast cancer dataset from GitHub Actions"
          file_pattern: preprocessing/breast_cancer_preprocessing/*
